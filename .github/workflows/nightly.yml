name: Nightly Gate

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  nightly-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: bash scripts/ci/lint.sh
      - name: Schema Gate
        run: bash scripts/ci/schema_gate.sh
      - name: Nightly Suite
        run: bash scripts/ci/test_nightly.sh
