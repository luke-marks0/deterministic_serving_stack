apiVersion: batch/v1
kind: Job
metadata:
  name: deterministic-runner
  labels:
    app.kubernetes.io/name: deterministic-serving-stack
    app.kubernetes.io/component: runner
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deterministic-serving-stack
        app.kubernetes.io/component: runner
    spec:
      restartPolicy: Never
      nodeSelector:
        hardware.gpu.vendor: {{ .Values.gpu.vendor }}
        hardware.gpu.model: {{ .Values.gpu.model }}
        hardware.nic.model: {{ .Values.nic.model }}
      containers:
        - name: runner
          image: {{ .Values.runnerImage.repository }}@{{ .Values.runnerImage.digest }}
          imagePullPolicy: IfNotPresent
          command: ["python3", "/app/cmd/server/main.py"]
          args:
            - --manifest
            - {{ .Values.mounts.manifestPath | quote }}
            - --lockfile
            - {{ .Values.mounts.lockfilePath | quote }}
            - --out-dir
            - /var/run/deterministic-serving
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
          ports:
            - containerPort: 8000
          env:
            - name: RUNNER_POD_MANIFEST_PATH
              value: {{ .Values.mounts.manifestPath | quote }}
            - name: RUNNER_POD_LOCKFILE_PATH
              value: {{ .Values.mounts.lockfilePath | quote }}
            - name: RUNNER_POD_RUNTIME_CLOSURE_PATH
              value: {{ .Values.mounts.runtimeClosurePath | quote }}
            - name: RUNNER_ENABLE_HOST_PROBE
              value: "1"
            - name: VLLM_BATCH_INVARIANT
              value: "1"
            - name: RUNNER_POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RUNNER_NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: RUNNER_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.gpu.count | quote }}
          volumeMounts:
            - name: run-inputs
              mountPath: /run-inputs
              readOnly: true
            - name: run-output
              mountPath: /var/run/deterministic-serving
      volumes:
        - name: run-inputs
          configMap:
            name: deterministic-run-inputs
        - name: run-output
          emptyDir: {}
